name: debt_payoff_manager
description: "Debt Payoff Manager — Living plan for debt freedom."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management (BLoC / Cubit)
  flutter_bloc: ^9.1.0
  bloc: ^9.0.0

  # Dependency Injection
  get_it: ^8.0.3
  injectable: ^2.5.0

  # Navigation
  go_router: ^15.1.0

  # Database (Local-first)
  drift: ^2.23.0
  sqlite3_flutter_libs: ^0.5.0
  path_provider: ^2.1.0
  path: ^1.9.0

  # Financial precision (spec §2)
  decimal: ^3.2.1

  # UI
  fl_chart: ^0.70.2
  intl: ^0.20.1
  google_fonts: ^6.2.1
  flutter_animate: ^4.5.2
  lucide_icons: ^0.257.0

  # Utilities
  uuid: ^4.5.1
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  collection: ^1.19.0
  equatable: ^2.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  # Code generation
  build_runner: ^2.4.15
  freezed: ^2.5.7
  json_serializable: ^6.9.4
  drift_dev: ^2.23.0
  injectable_generator: ^2.7.0

  # Testing
  mocktail: ^1.0.4
  bloc_test: ^10.0.0

flutter:
  uses-material-design: true
