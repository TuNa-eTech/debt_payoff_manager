name: Nightly

on:
  schedule:
    # Run at 02:00 UTC daily
    - cron: '0 2 * * *'
  workflow_dispatch:  # manual trigger

env:
  FLUTTER_VERSION: '3.38.3'

jobs:
  integration:
    name: E2E integration tests
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs

      - name: Start iOS simulator
        run: |
          xcrun simctl boot "iPhone 15" || true
          xcrun simctl list | grep Booted

      - name: Run integration tests
        run: flutter test integration_test --device-id=$(xcrun simctl list | grep 'iPhone 15 (' | head -1 | grep -oE '\([A-F0-9-]+\)' | head -1 | tr -d '()')

  performance:
    name: Performance regression
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true
      - run: flutter pub get
      - run: dart run build_runner build --delete-conflicting-outputs
      - name: Run performance tests
        run: flutter test test/perf --reporter expanded

  dependency-audit:
    name: Dependency audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
      - run: flutter pub get
      - name: Check for outdated
        run: flutter pub outdated --json > outdated.json || true
      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: outdated-deps
          path: outdated.json
